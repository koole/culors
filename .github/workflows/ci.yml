name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Install npm deps
        run: npm ci
      - name: Build (default features)
        run: cargo build --verbose
      - name: Build (all features)
        run: cargo build --all-features --verbose
      - name: Build (no default features)
        run: cargo build --no-default-features --verbose
      - name: Test (default features)
        run: cargo test --verbose
      - name: Test (all features)
        run: cargo test --all-features --verbose
      - name: Test (no default features)
        run: cargo test --no-default-features --verbose

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: rustfmt
        run: cargo fmt -- --check
      - name: clippy (all features)
        run: cargo clippy --all-features --all-targets -- -D warnings
      - name: clippy (no default features)
        run: cargo clippy --no-default-features --all-targets -- -D warnings
      - name: doc (warnings as errors)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --all-features --no-deps

  fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - name: Snapshot committed fixtures
        run: cp -r tests/fixtures /tmp/fixtures-committed
      - name: Generate conversion fixtures
        run: npm run gen-fixtures
      - name: Generate parse fixtures
        run: npm run gen-parse-fixtures
      - name: Generate format fixtures
        run: npm run gen-format-fixtures
      - name: Verify no drift beyond floating-point tolerance
        run: node fixtures-gen/check-drift.mjs /tmp/fixtures-committed tests/fixtures
      - name: Run color-mix reference (smoke check, no fixture file)
        run: node fixtures-gen/color-mix-ref.mjs > /dev/null

  publish-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo publish --dry-run
        run: cargo publish --dry-run
